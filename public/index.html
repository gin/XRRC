<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>XRRC – WebXR RC Cars</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <canvas id="scene" aria-label="XRRC game view"></canvas>

    <div id="overlay">
      <main id="lobby">
        <h1 class="logo">XRRC</h1>
        <p class="tagline">WebXR RC Cars 2.0</p>

        <div class="field">
          <label for="room-input">Room</label>
          <input id="room-input" type="text" value="default" maxlength="32" autocomplete="off" spellcheck="false" />
        </div>

        <fieldset class="field props-field">
          <legend>Track props</legend>
          <label><input id="prop-jump" type="checkbox" checked /> Jump</label>
          <label><input id="prop-loop" type="checkbox" checked /> Loop</label>
        </fieldset>

        <div class="mode-grid">
          <button id="webxr-btn" class="primary-btn" disabled>Checking WebXR…</button>
          <button id="eighthwall-btn" class="secondary-btn">Use 8th Wall</button>
          <button id="desktop-btn" class="secondary-btn">Play in 3D</button>
        </div>
        <p id="lobby-status" class="status-text" aria-live="polite"></p>
      </main>

      <div id="hud" hidden>
        <div id="peer-badge" title="Players">
          <span id="peer-icon">🏎️</span>
          <span id="peer-count">1</span>
        </div>
        <a id="share-link" href="#" class="share-link hud-share" hidden>Copy room link</a>
        <div id="place-hint" class="hint-banner">Point at a flat surface, then tap to place the track</div>
        <div id="joystick-zone">
          <div id="joystick">
            <div id="joystick-knob"></div>
          </div>
        </div>
        <div id="key-hint" class="key-hint">WASD / Arrow keys</div>
      </div>
    </div>

    <script src="js/network.js"></script>
    <script src="js/controls.js"></script>
    <script type="module">
      import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js';
      window.THREE = THREE;
      await import('./js/game.js');
    </script>
  </body>
</html>
